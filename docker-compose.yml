services:
  backend:
    build:
      context: ./backend
    network_mode: host
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-}
      - KUBECONFIG_PATH=${KUBECONFIG_PATH:-/kube/config}
      - INSFORGE_BASE_URL=${INSFORGE_BASE_URL:-https://g95zitdu.us-east.insforge.app}
      - INSFORGE_ANON_KEY=${INSFORGE_ANON_KEY:-}
    volumes:
      - ${HOME}/.kube:/kube:ro

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
        NEXT_PUBLIC_INSFORGE_BASE_URL: https://g95zitdu.us-east.insforge.app
        NEXT_PUBLIC_INSFORGE_ANON_KEY: ${INSFORGE_ANON_KEY:-}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
      - NEXT_PUBLIC_INSFORGE_BASE_URL=https://g95zitdu.us-east.insforge.app
      - NEXT_PUBLIC_INSFORGE_ANON_KEY=${INSFORGE_ANON_KEY:-}



